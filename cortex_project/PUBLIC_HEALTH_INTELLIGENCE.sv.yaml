verified_queries:
  - name: 0;1
    question: Which outbreak categories have the most cases?
    sql: SELECT OUTBREAK_CATEGORY, SUM(TOTAL_CASES) AS TOTAL_CASES FROM outbreak_cases
      GROUP BY OUTBREAK_CATEGORY ORDER BY TOTAL_CASES DESC
    verified_at: 1784139595
    verified_by: Semantic Model Generator
  - name: 1;1
    question: Which public health units currently have the most active outbreaks?
    sql: SELECT PHU_NAME, SUM(ONGOING_OUTBREAKS) AS TOTAL_OUTBREAKS FROM outbreaks_by_phu
      WHERE REPORT_DATE = (SELECT MAX(REPORT_DATE) FROM outbreaks_by_phu) GROUP BY
      PHU_NAME ORDER BY TOTAL_OUTBREAKS DESC LIMIT 10
    verified_at: 1784139595
    verified_by: Semantic Model Generator
  - name: 2;1
    question: Which public health units have the highest long-term care resident deaths
      in the most recent reporting period?
    sql: SELECT PHU_NAME, ACTIVE_OUTBREAK_HOMES, RESIDENT_CASES, RESIDENT_DEATHS FROM
      ltc_summary_phu WHERE REPORT_DATE = (SELECT MAX(REPORT_DATE) FROM ltc_summary_phu)
      ORDER BY RESIDENT_DEATHS DESC LIMIT 10
    verified_at: 1784139595
    verified_by: Semantic Model Generator
  - name: 3;1
    question: Which long-term care homes have experienced the most resident deaths
      in the most recent reporting period?
    sql: SELECT LTC_HOME_NAME, CITY, PHU_NAME, BED_CAPACITY, RESIDENT_DEATHS FROM
      ltc_resolved WHERE REPORT_DATE = (SELECT MAX(REPORT_DATE) FROM ltc_resolved)
      ORDER BY RESIDENT_DEATHS DESC LIMIT 10
    verified_at: 1784139595
    verified_by: Semantic Model Generator
  - name: 4;1
    question: What is the recent trend in hospitalizations and ICU admissions over
      the last 30 reporting periods?
    sql: SELECT REPORT_DATE, SUM(HOSPITALIZATIONS) AS TOTAL_HOSPITALIZATIONS, SUM(ICU_COVID_PATIENTS)
      AS TOTAL_ICU_COVID, SUM(ICU_COVID_VENTILATED) AS TOTAL_VENTILATED FROM hospital_icu
      GROUP BY REPORT_DATE ORDER BY REPORT_DATE DESC LIMIT 30
    verified_at: 1784139595
    verified_by: Semantic Model Generator

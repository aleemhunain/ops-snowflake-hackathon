name: PUBLIC_HEALTH_INTELLIGENCE
description: Ontario Public Health Intelligence model covering outbreak activity by
  setting and category, geographic spread by Public Health Unit, long-term care vulnerability
  and mortality, and hospital/ICU capacity pressure. Supports disease monitoring,
  geographic risk assessment, vulnerable population tracking, and healthcare burden
  analysis.
